name: Build Image Push to GHCR


on:
  push:
    branches:
      - main
  release:
    types: [published]
  schedule:
    - cron: '22 00 * * 1' # Run every Monday at 00:22 UTC
  workflow_dispatch:

env:
  IMAGE_NAME: "nginx"
  GHCR_REPO_URL: "ghcr.io/neilkuan/nginx"

permissions:
  contents: read
  packages: write

jobs:
  nginx-image-build-amd64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Log into GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login https://ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push AMD64 image
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile
          context: .
          platforms: linux/amd64
          tags: |
            ${{ env.GHCR_REPO_URL}}:latest-amd64
            ${{ github.event_name == 'release' && format('{0}:{1}-amd64', env.GHCR_REPO_URL, github.ref_name) || '' }}
          push: true
          provenance: false
          sbom: false


  nginx-image-build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Log into GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login https://ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push ARM64 image
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile
          context: .
          platforms: linux/arm64
          tags: |
            ${{ env.GHCR_REPO_URL}}:latest-arm64
            ${{ github.event_name == 'release' && format('{0}:{1}-arm64', env.GHCR_REPO_URL, github.ref_name) || '' }}
          push: true
          provenance: false
          sbom: false

  create-manifest:
    needs: [nginx-image-build-amd64, nginx-image-build-arm64]
    runs-on: ubuntu-24.04
    steps:
      - name: Log into GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login https://ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Create and push manifest
        run: |
          docker manifest create \
            ${{ env.GHCR_REPO_URL}}:latest \
            ${{ env.GHCR_REPO_URL}}:latest-amd64 \
            ${{ env.GHCR_REPO_URL}}:latest-arm64
          docker manifest push ${{ env.GHCR_REPO_URL}}:latest
          if [ "${{ github.event_name }}" = "release" ]; then
            docker manifest create \
              ${{ env.GHCR_REPO_URL}}:${{ github.ref_name }} \
              ${{ env.GHCR_REPO_URL}}:${{ github.ref_name }}-amd64 \
              ${{ env.GHCR_REPO_URL}}:${{ github.ref_name }}-arm64
            docker manifest push ${{ env.GHCR_REPO_URL}}:${{ github.ref_name }}
          fi